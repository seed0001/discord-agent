# Hybrid runtime: Python bot + Node.js voice listener sidecar.
# nodejs   — runs listener/ (discord.js voice with DAVE E2EE support)
# ffmpeg   — TTS mp3 playback in the sidecar (via prism-media)
[phases.setup]
nixPkgs = ["...", "nodejs_22"]
aptPkgs = ["ffmpeg"]

[phases.listener]
dependsOn = ["install"]
cmds = ["cd listener && npm ci --omit=dev"]
